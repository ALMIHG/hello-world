<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Запуск игры — Кефирный Роботик</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
      background: radial-gradient(circle at top, #fffce8 0%, #fff7d6 55%, #ffe8ef 100%);
      color: #2f2f44;
    }
    .card {
      width: min(560px, 92vw);
      background: #fff;
      border: 4px solid #ffc7e3;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(47,47,68,.16);
    }
    h1 { margin-top: 0; }
    p { font-size: 1.1rem; }
    a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      margin-top: 8px;
      background: linear-gradient(140deg, #ff71b8, #7c5ce4);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 1.1rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>🧃 Кефирный Роботик</h1>
    <p>Нажмите кнопку ниже, чтобы запустить игру.</p>
    <a href="./index.html">▶ Запустить игру</a>
  </main>
</body>
</html>
